name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK Environment
        uses: android-actions/setup-android@v3

      - name: Prepare Workspace Folder Structure
        run: |
          mkdir -p www
          if [ -f index.html ]; then mv index.html www/; fi
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Generate Core App Configurations
        run: |
          npx cap init "Family Tracker" "com.family.gps" --web-dir=www
          npx cap add android

      - name: Fix and Force Generate Missing Gradle Tools
        run: |
          cd android
          # 🛠️ Uses the server's globally installed gradle tools to generate the local gradlew wrapper files natively
          gradle wrapper

      - name: Inject Mobile GPS Permissions
        run: |
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Sync Frontend Code Assets
        run: |
          npx cap copy android

      - name: Compile Standalone Phone App (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Finished App File
        uses: actions/upload-artifact@v4
        with:
          name: Family-Tracker-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
