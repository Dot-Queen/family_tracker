name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Web Directory Environment
        run: |
          mkdir -p www
          if [ -f index.html ]; then mv index.html www/; fi
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor Layout
        run: |
          npx cap init "Family Tracker" "com.family.gps" --web-dir=www
          npx cap add android

      - name: Inject System GPS Permissions
        run: |
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Clean Sync Project Assets
        run: |
          npx cap copy android
          npx cap sync android

      - name: Build Standalone Android App (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon

      - name: Upload Finished App File
        uses: actions/upload-artifact@v4
        with:
          name: Family-Tracker-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
